<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nepal Ministers Lookup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f9f9f9;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    select, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #result {
      background: #fff;
      padding: 20px;
      margin-top: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-wrap; /* preserves line breaks */
    }
  </style>
</head>
<body>

  <h1>Nepal Minister Details</h1>

  <label for="ministry">Select Ministry:</label>
  <select id="ministry"></select>

  <div id="result">Select a ministry to see details.</div>

  <script type="module" src="script.js"></script>

</body>
</html>
