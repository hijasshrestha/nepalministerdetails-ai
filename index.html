<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nepal Ministers Lookup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: auto;
      background: #f0f2f5;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 2em;
      color: #222;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
      font-size: 1.1em;
    }

    select {
      padding: 12px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    #result {
      background: #fff;
      padding: 20px;
      font-size: 18px;       /* bigger text */
      line-height: 1.6;      /* more spacing */
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>Nepal Minister Details</h1>

  <label for="ministry">Select Ministry:</label>
  <select id="ministry"></select>

  <pre id="result"></pre>

  <script type="module" src="script.js"></script>

</body>
</html>
